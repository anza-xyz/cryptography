version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
